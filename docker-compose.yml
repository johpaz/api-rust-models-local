services:
  # ═══════════════════════════════════════════════════════
  # llama-server: Motor de inferencia con TurboQuant
  # ═══════════════════════════════════════════════════════
  llama-server:
    build:
      context: ./llama-server
      dockerfile: Dockerfile
    container_name: llama-server
    restart: unless-stopped
    volumes:
      - ./models:/models:ro
      - /dev/dri:/dev/dri  # Vulkan GPU passthrough
    devices:
      - /dev/dri:/dev/dri  # Direct rendering
    environment:
      - LLAMA_ARG_MODEL=/models/${MODEL_NAME}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_CTX_SIZE=${CONTEXT_SIZE:-8192}
      - LLAMA_ARG_N_PARALLEL=${MAX_CONCURRENCY:-1}
      - LLAMA_ARG_N_GPU_LAYERS=${GPU_LAYERS:-35}  # GPU layers for Vulkan
      - LLAMA_ARG_CACHE_TYPE_K=${CACHE_TYPE_K:-turbo3}
      - LLAMA_ARG_CACHE_TYPE_V=${CACHE_TYPE_V:-turbo3}
    deploy:
      resources:
        limits:
          memory: ${MODEL_MEMORY_LIMIT:-30G}
    networks:
      - llm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════
  # API Rust: Servidor HTTP OpenAI-compatible
  # ═══════════════════════════════════════════════════════
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: llm-api-server
    restart: unless-stopped
    ports:
      - "${API_PORT:-9000}:3000"
    depends_on:
      llama-server:
        condition: service_healthy
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - LLAMA_SERVER_URL=http://llama-server:8080
      - API_TOKEN=${API_TOKEN:-secure-token-here}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.7}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_SECONDS=${RATE_LIMIT_SECONDS:-60}
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
