services:
  llama-server:
    build:
      context: .
      dockerfile: llama-server.Dockerfile
    container_name: llama-server
    restart: unless-stopped
    volumes:
      - ./models:/models:ro
    environment:
      - LLAMA_ARG_MODEL=${MODEL_PATH:-/models/model.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_N_CTX=${CONTEXT_SIZE:-4096}
      - LLAMA_ARG_N_PARALLEL=${MAX_CONCURRENCY:-1}
    deploy:
      resources:
        limits:
          memory: 30G
    networks:
      - llm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  llm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-api-server
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      llama-server:
        condition: service_healthy
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - LLAMA_SERVER_URL=http://llama-server:8080
      - API_TOKEN=${API_TOKEN:-secure-token-here}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.7}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_SECONDS=${RATE_LIMIT_SECONDS:-60}
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
